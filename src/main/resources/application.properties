# Server
server.port=8080

# Database (H2 for dev, swap to PostgreSQL for prod)
spring.datasource.url=jdbc:h2:mem:resumeai
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# PostgreSQL (uncomment for production)
# spring.datasource.url=jdbc:postgresql://localhost:5432/resumeai
# spring.datasource.username=your_db_user
# spring.datasource.password=your_db_password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=your-256-bit-secret-key-change-this-in-production-must-be-long
jwt.expiration=86400000

# Claude API
claude.api.key=your-claude-api-key-here
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-20250514

# Razorpay
razorpay.key.id=your-razorpay-key-id
razorpay.key.secret=your-razorpay-key-secret

# CORS
cors.allowed.origins=http://localhost:3000,https://yourdomain.com

# File upload
spring.servlet.multipart.max-file-size=10MB

# Razorpay Unlimited Plan ID (create in Razorpay dashboard → Subscriptions → Plans)
razorpay.plan.unlimited.id=plan_placeholder

# Razorpay Webhook Secret (set in Razorpay dashboard → Webhooks)
razorpay.webhook.secret=your_webhook_secret
