# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (PostgreSQL via Railway) ─────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Claude API ────────────────────────────────────────────────────────────────
claude.api.key=${CLAUDE_API_KEY}
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-20250514

# ── Razorpay ──────────────────────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ORIGINS:https://your-app.vercel.app}

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.resumeai=INFO
logging.level.org.springframework.security=WARN

# Razorpay Unlimited Plan ID
razorpay.plan.unlimited.id=${RAZORPAY_UNLIMITED_PLAN_ID}

# Razorpay Webhook Secret
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET}
